<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="HTML 轻阅 Logo C v2 Dark - 弱括号 h1 暗色版">
  <!-- ============================================
       方向 C v2 · <h1> 弱化版 · 暗色版
       与 logo-final.svg 完全相同的结构，仅替换色值。
       色彩映射依据：2026-06-01-htmlreader-v1.4-dark-color-system.md §6.3
       - 浅色 #D97757 (Brand Coral)       → 暗色 #E89070
       - 浅色 #B8542A (Burnt Orange)      → 暗色 #D67852
       - 浅色 #C2613E (h1 主色)            → 暗色 #E58660
       - 浅色 #FAF7F0/#F0E9DA (米色渐变)   → 暗色 #2A2622/#33302B
       - 浅色 #FAF7F0/#F5EFE0 (印章底)     → 暗色 #2A2622/#33302B
       - paper pattern #2C2825 (深色 dot) → 暗色 #E8E2D8 (米白 dot, 暗底上"反向"质感)
       ============================================ -->

  <defs>
    <linearGradient id="bgC2vDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2622"/>
      <stop offset="1" stop-color="#33302B"/>
    </linearGradient>
    <linearGradient id="sealC2vBgDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2622"/>
      <stop offset="1" stop-color="#33302B"/>
    </linearGradient>
    <pattern id="paperC2vDark" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.3" fill="#E8E2D8"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgC2vDark)"/>
  <rect width="1024" height="1024" fill="url(#paperC2vDark)" opacity="0.06"/>

  <circle cx="512" cy="512" r="400" fill="none" stroke="#E89070" stroke-width="8"/>
  <circle cx="512" cy="512" r="378" fill="none" stroke="#E89070" stroke-width="2" opacity="0.6"/>
  <circle cx="512" cy="512" r="350" fill="url(#sealC2vBgDark)" stroke="#D67852" stroke-width="6"/>

  <defs>
    <path id="topArcC2vDark" d="M 232 512 A 280 280 0 0 1 792 512" fill="none"/>
    <path id="botArcC2vDark" d="M 232 512 A 280 280 0 0 0 792 512" fill="none"/>
  </defs>

  <text font-family="'DejaVu Serif', Georgia, 'Times New Roman', serif" font-size="46" letter-spacing="14" fill="#D67852" font-weight="700">
    <textPath href="#topArcC2vDark" startOffset="50%" text-anchor="middle">HTML · READER</textPath>
  </text>
  <text font-family="'DejaVu Serif', Georgia, 'Times New Roman', serif" font-size="32" letter-spacing="10" fill="#D67852" font-weight="500" opacity="0.7">
    <textPath href="#botArcC2vDark" startOffset="50%" text-anchor="middle">EST · 2026</textPath>
  </text>

  <g fill="#D67852">
    <circle cx="232" cy="512" r="6"/>
    <circle cx="792" cy="512" r="6"/>
  </g>

  <!-- 左尖括号：弱化 -->
  <text x="320" y="615"
        text-anchor="middle"
        font-family="'DejaVu Sans Mono', 'Courier New', monospace"
        font-size="160"
        font-weight="400"
        fill="#E89070"
        opacity="0.35">&lt;</text>

  <!-- 中间 h1：强化（衬线大字 + 暗色版品牌色 + 斜体）-->
  <text x="512" y="640"
        text-anchor="middle"
        font-family="'DejaVu Serif', Georgia, 'Times New Roman', serif"
        font-size="320"
        font-weight="700"
        fill="#E58660"
        font-style="italic">h1</text>

  <!-- 右尖括号：弱化 -->
  <text x="700" y="615"
        text-anchor="middle"
        font-family="'DejaVu Sans Mono', 'Courier New', monospace"
        font-size="160"
        font-weight="400"
        fill="#E89070"
        opacity="0.35">&gt;</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="HTML 轻阅 Logo C v2 - 弱括号 h1">
  <!-- ============================================
       方向 C v2 · <h1> 弱化版
       - 尖括号字号 220 → 160, opacity 1 → 0.35, 字重 700 → 400
       - h1 字号 220 → 320, 加重 + 颜色保持深色
       - h1 用衬线字体（区别于 mono 括号，制造层级对比）
       ============================================ -->

  <defs>
    <linearGradient id="bgC2v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF7F0"/>
      <stop offset="1" stop-color="#F0E9DA"/>
    </linearGradient>
    <linearGradient id="sealC2vBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF7F0"/>
      <stop offset="1" stop-color="#F5EFE0"/>
    </linearGradient>
    <pattern id="paperC2v" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.3" fill="#2C2825"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgC2v)"/>
  <rect width="1024" height="1024" fill="url(#paperC2v)" opacity="0.06"/>

  <circle cx="512" cy="512" r="400" fill="none" stroke="#D97757" stroke-width="8"/>
  <circle cx="512" cy="512" r="378" fill="none" stroke="#D97757" stroke-width="2" opacity="0.6"/>
  <circle cx="512" cy="512" r="350" fill="url(#sealC2vBg)" stroke="#B8542A" stroke-width="6"/>

  <defs>
    <path id="topArcC2v" d="M 232 512 A 280 280 0 0 1 792 512" fill="none"/>
    <path id="botArcC2v" d="M 232 512 A 280 280 0 0 0 792 512" fill="none"/>
  </defs>

  <text font-family="'DejaVu Serif', Georgia, 'Times New Roman', serif" font-size="46" letter-spacing="14" fill="#B8542A" font-weight="700">
    <textPath href="#topArcC2v" startOffset="50%" text-anchor="middle">HTML · READER</textPath>
  </text>
  <text font-family="'DejaVu Serif', Georgia, 'Times New Roman', serif" font-size="32" letter-spacing="10" fill="#B8542A" font-weight="500" opacity="0.7">
    <textPath href="#botArcC2v" startOffset="50%" text-anchor="middle">EST · 2026</textPath>
  </text>

  <g fill="#B8542A">
    <circle cx="232" cy="512" r="6"/>
    <circle cx="792" cy="512" r="6"/>
  </g>

  <!-- 左尖括号：弱化 -->
  <text x="320" y="615"
        text-anchor="middle"
        font-family="'DejaVu Sans Mono', 'Courier New', monospace"
        font-size="160"
        font-weight="400"
        fill="#D97757"
        opacity="0.35">&lt;</text>

  <!-- 中间 h1：强化（衬线大字 + 深色 + 斜体）-->
  <text x="512" y="640"
        text-anchor="middle"
        font-family="'DejaVu Serif', Georgia, 'Times New Roman', serif"
        font-size="320"
        font-weight="700"
        fill="#C2613E"
        font-style="italic">h1</text>

  <!-- 右尖括号：弱化 -->
  <text x="700" y="615"
        text-anchor="middle"
        font-family="'DejaVu Sans Mono', 'Courier New', monospace"
        font-size="160"
        font-weight="400"
        fill="#D97757"
        opacity="0.35">&gt;</text>

</svg>

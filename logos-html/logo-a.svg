<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="HTML 轻阅 Logo A - 尖括号 H 印章">
  <!-- ============================================
       方向 A · <H> 标签嵌字
       核心：尖括号 + 衬线大写 H，杂志徽章感保留
       含义：HTML 文档的根标签 + Quiet Reading 的 H
       ============================================ -->

  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF7F0"/>
      <stop offset="1" stop-color="#F0E9DA"/>
    </linearGradient>
    <linearGradient id="sealABg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF7F0"/>
      <stop offset="1" stop-color="#F5EFE0"/>
    </linearGradient>
    <pattern id="paperA" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.3" fill="#2C2825"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgA)"/>
  <rect width="1024" height="1024" fill="url(#paperA)" opacity="0.06"/>

  <!-- 外层装饰圆环 -->
  <circle cx="512" cy="512" r="400" fill="none" stroke="#D97757" stroke-width="8"/>
  <circle cx="512" cy="512" r="378" fill="none" stroke="#D97757" stroke-width="2" opacity="0.6"/>

  <!-- 主印章圆 -->
  <circle cx="512" cy="512" r="350" fill="url(#sealABg)" stroke="#B8542A" stroke-width="6"/>

  <!-- 上下弧线文字 -->
  <defs>
    <path id="topArcA" d="M 232 512 A 280 280 0 0 1 792 512" fill="none"/>
    <path id="botArcA" d="M 232 512 A 280 280 0 0 0 792 512" fill="none"/>
  </defs>

  <text font-family="'DejaVu Serif', Georgia, 'Times New Roman', serif" font-size="46" letter-spacing="14" fill="#B8542A" font-weight="700">
    <textPath href="#topArcA" startOffset="50%" text-anchor="middle">HTML · READER</textPath>
  </text>
  <text font-family="'DejaVu Serif', Georgia, 'Times New Roman', serif" font-size="32" letter-spacing="10" fill="#B8542A" font-weight="500" opacity="0.7">
    <textPath href="#botArcA" startOffset="50%" text-anchor="middle">EST · 2026</textPath>
  </text>

  <!-- 左右装饰小星点 -->
  <g fill="#B8542A">
    <circle cx="232" cy="512" r="6"/>
    <circle cx="792" cy="512" r="6"/>
  </g>

  <!-- 中心 <H> 标签嵌字 -->
  <!-- 左尖括号 -->
  <text x="345" y="640"
        text-anchor="middle"
        font-family="'DejaVu Sans Mono', 'Courier New', monospace"
        font-size="320"
        font-weight="700"
        fill="#D97757">&lt;</text>

  <!-- 中间 H -->
  <text x="512" y="640"
        text-anchor="middle"
        font-family="'DejaVu Serif', Georgia, 'Times New Roman', serif"
        font-size="340"
        font-weight="700"
        fill="#C2613E"
        font-style="italic">H</text>

  <!-- 右尖括号 -->
  <text x="680" y="640"
        text-anchor="middle"
        font-family="'DejaVu Sans Mono', 'Courier New', monospace"
        font-size="320"
        font-weight="700"
        fill="#D97757">&gt;</text>

</svg>

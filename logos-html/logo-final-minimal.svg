<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="HTML 轻阅 Logo Final Minimal - h1 印章（home screen）">
  <!-- ============================================
       正式版 · 极简版（home screen 用，≤180px）
       基于 logo-final.svg（即 C v2）的极简化：
       - 去除上下弧线文字（HTML·READER / EST·2026）
       - 去除内层细环
       - h1 字号 320 → 480（占绝对视觉中心）
       - h1 颜色 #C2613E 保持
       - 左右括号位置外移 + opacity 0.35 保持
       目的：60-180px 小尺寸下 h1 仍清晰可辨
       ============================================ -->

  <defs>
    <linearGradient id="bgFM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF7F0"/>
      <stop offset="1" stop-color="#F0E9DA"/>
    </linearGradient>
    <linearGradient id="sealFMBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF7F0"/>
      <stop offset="1" stop-color="#F5EFE0"/>
    </linearGradient>
    <pattern id="paperFM" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.3" fill="#2C2825"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgFM)"/>
  <rect width="1024" height="1024" fill="url(#paperFM)" opacity="0.06"/>

  <!-- 外层装饰圆环（加粗到 18px，小尺寸可见）-->
  <circle cx="512" cy="512" r="440" fill="none" stroke="#D97757" stroke-width="18"/>

  <!-- 主印章圆 -->
  <circle cx="512" cy="512" r="405" fill="url(#sealFMBg)" stroke="#B8542A" stroke-width="10"/>

  <!-- 左右装饰小星点（保留杂志徽章识别符）-->
  <g fill="#B8542A">
    <circle cx="180" cy="512" r="12"/>
    <circle cx="844" cy="512" r="12"/>
  </g>

  <!-- 左尖括号：弱化 -->
  <text x="240" y="660"
        text-anchor="middle"
        font-family="'DejaVu Sans Mono', 'Courier New', monospace"
        font-size="220"
        font-weight="400"
        fill="#D97757"
        opacity="0.35">&lt;</text>

  <!-- 中央 h1：强化（衬线大字 + 斜体 + 深赭石）-->
  <text x="512" y="695"
        text-anchor="middle"
        font-family="'DejaVu Serif', Georgia, 'Times New Roman', serif"
        font-size="480"
        font-weight="700"
        fill="#C2613E"
        font-style="italic">h1</text>

  <!-- 右尖括号：弱化 -->
  <text x="784" y="660"
        text-anchor="middle"
        font-family="'DejaVu Sans Mono', 'Courier New', monospace"
        font-size="220"
        font-weight="400"
        fill="#D97757"
        opacity="0.35">&gt;</text>

</svg>

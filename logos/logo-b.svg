<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="AI 轻阅 Logo B - 阅字印刷风格">
  <!-- ============================================
       方向 B · 阅字印刷风格（v2 - 用真字体而非几何拼接）
       使用系统字体的"阅"字 + 橘色圆形印章背景
       印刷品角标点缀
       ============================================ -->

  <defs>
    <!-- 圆形印章背景：橘色实心 -->
    <radialGradient id="sealB" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#E08866"/>
      <stop offset="0.6" stop-color="#D97757"/>
      <stop offset="1" stop-color="#B8542A"/>
    </radialGradient>

    <linearGradient id="bgB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF7F0"/>
      <stop offset="1" stop-color="#F0E9DA"/>
    </linearGradient>

    <pattern id="paperB" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.3" fill="#2C2825"/>
    </pattern>

    <!-- 印章质感：边缘略不规则 -->
    <filter id="sealTexB">
      <feTurbulence baseFrequency="1.2" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgB)"/>
  <rect width="1024" height="1024" fill="url(#paperB)" opacity="0.06"/>

  <!-- 四角印刷品角标 -->
  <g stroke="#2C2825" stroke-width="3" opacity="0.4">
    <line x1="80" y1="80" x2="160" y2="80"/>
    <line x1="80" y1="80" x2="80" y2="160"/>
    <line x1="944" y1="80" x2="864" y2="80"/>
    <line x1="944" y1="80" x2="944" y2="160"/>
    <line x1="80" y1="944" x2="160" y2="944"/>
    <line x1="80" y1="944" x2="80" y2="864"/>
    <line x1="944" y1="944" x2="864" y2="944"/>
    <line x1="944" y1="944" x2="944" y2="864"/>
  </g>

  <!-- 圆形印章背景 -->
  <g filter="url(#sealTexB)">
    <circle cx="512" cy="512" r="330" fill="url(#sealB)"/>
  </g>

  <!-- 印章内细边 -->
  <circle cx="512" cy="512" r="310" fill="none" stroke="#FAF7F0" stroke-width="3" opacity="0.7"/>

  <!-- "阅" 字（用真正的中文字体）-->
  <text x="512" y="650"
        text-anchor="middle"
        font-family="'PingFang SC', 'Heiti SC', 'Source Han Sans CN', 'Microsoft YaHei', sans-serif"
        font-size="460"
        font-weight="700"
        fill="#FAF7F0"
        letter-spacing="0">阅</text>

</svg>
